<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USASL – Live Competition</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:   #c0392b;
    --green: #27ae60;
    --gold:  #f0c040;
    --bg:    #0a0a0a;
    --card:  #111;
    --muted: #666;
    --text:  #f0f0f0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Arial', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .6rem 2rem;
    background: #0d0d0d;
    border-bottom: 2px solid var(--red);
    flex-shrink: 0;
  }
  header img { height: 36px; }
  #comp-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
  #live-badge {
    background: var(--red); color: #fff; font-size: .7rem; font-weight: 700;
    padding: .25rem .6rem; border-radius: 4px; letter-spacing: .1em;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Main layout ── */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* ── Athlete card (left) ── */
  #athlete-panel {
    background: var(--card);
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1.25rem;
    gap: 1rem;
    overflow: hidden;
  }
  #athlete-photo {
    width: 100%; aspect-ratio: 1;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid #222;
    background: #1a1a1a;
    max-height: 220px;
  }
  #athlete-name {
    font-size: 1.5rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: .04em; line-height: 1.1;
  }
  #athlete-meta {
    font-size: .8rem; color: var(--muted); display: flex; flex-direction: column; gap: .2rem;
  }
  #athlete-meta span { display: block; }
  #athlete-highlights {
    font-size: .8rem; color: #aaa; line-height: 1.5;
    border-top: 1px solid #1e1e1e; padding-top: .75rem;
  }
  #athlete-highlights strong { color: var(--gold); display: block; margin-bottom: .25rem; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; }

  /* ── Live scoring panel (right) ── */
  #score-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Current attempt big display */
  #current-attempt {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: .5rem;
    padding: 2rem;
    border-bottom: 1px solid #1e1e1e;
    flex-shrink: 0;
    background: #0d0d0d;
  }
  #lift-label {
    font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted);
  }
  #attempt-label {
    font-size: .65rem; letter-spacing: .1em; text-transform: uppercase;
    background: var(--red); color: #fff; padding: .15rem .5rem; border-radius: 3px;
  }
  #current-weight {
    font-size: 5rem; font-weight: 900; line-height: 1;
    letter-spacing: -.02em; color: #fff;
  }
  #current-weight span { font-size: 2rem; font-weight: 400; color: var(--muted); }

  /* Result flash */
  #result-flash {
    font-size: 2rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: .1em; height: 2.5rem; text-align: center;
    transition: opacity .3s;
  }
  #result-flash.good  { color: var(--green); }
  #result-flash.nolift { color: var(--red); }

  /* ── Scoreboard ── */
  #scoreboard {
    flex: 1; overflow-y: auto; padding: 1rem 1.5rem;
  }
  #scoreboard h3 {
    font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: .75rem;
  }

  .sb-row {
    display: grid;
    grid-template-columns: 1.8rem 1fr auto auto;
    align-items: center;
    gap: .5rem;
    padding: .4rem .5rem;
    border-radius: 6px;
    margin-bottom: .25rem;
    background: #161616;
    font-size: .8rem;
  }
  .sb-row.current { background: #1e1210; border-left: 3px solid var(--red); }
  .sb-row .pos { font-size: .7rem; color: var(--muted); text-align: center; }
  .sb-row .sb-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-row .sb-wc { font-size: .7rem; color: var(--muted); }
  .sb-dots { display: flex; gap: 3px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid #333;
    background: transparent;
  }
  .dot.good   { background: var(--green); border-color: var(--green); }
  .dot.nolift { background: var(--red);   border-color: var(--red); }

  /* ── Lift tabs ── */
  #lift-tabs {
    display: flex;
    border-top: 1px solid #1e1e1e;
    flex-shrink: 0;
  }
  .lift-tab {
    flex: 1; text-align: center; padding: .5rem;
    font-size: .65rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); border-top: 2px solid transparent;
  }
  .lift-tab.active { color: #fff; border-top-color: var(--red); }

  /* ── Waiting screen ── */
  #waiting {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 1rem; text-align: center;
  }
  #waiting img { height: 56px; opacity: .7; }
  #waiting p { color: var(--muted); font-size: .9rem; }

  #status-bar {
    font-size: .65rem; text-align: center; color: var(--muted);
    padding: .3rem; background: #0d0d0d; flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <img src="https://usastreetlifting.org/wp-content/uploads/2024/08/cropped-USA-Streetlifting-Transparent-File-PNG-1.png" alt="USASL">
  <span id="comp-title">Loading…</span>
  <span id="live-badge">● LIVE</span>
</header>

<main id="main-content">
  <div id="waiting">
    <img src="https://usastreetlifting.org/wp-content/uploads/2024/08/cropped-USA-Streetlifting-Transparent-File-PNG-1.png" alt="USASL">
    <p id="waiting-msg">Connecting to live feed…</p>
  </div>
</main>

<div id="status-bar">Connecting…</div>

<script>
const compId = new URLSearchParams(location.search).get('id');
if (!compId) {
  document.getElementById('waiting-msg').textContent = 'No competition ID in URL. Add ?id=YOUR_COMP_ID';
}

const LIFT_NAMES = {
  muscle_up: 'Muscle Up', pull_up: 'Pull Up', dip: 'Dip', squat: 'Squat'
};
const LIFTS = ['muscle_up', 'pull_up', 'dip', 'squat'];

let state = null;
let lastResultAt = 0;

function render(data) {
  state = data;
  const { comp, athletes, attempts } = data;

  document.getElementById('comp-title').textContent = comp.name;
  document.getElementById('status-bar').textContent =
    `Flight ${comp.cur_flight} · ${LIFT_NAMES[comp.cur_lift]} · Attempt ${comp.cur_attempt} · ${athletes.length} athletes`;

  if (comp.status === 'setup') {
    document.getElementById('main-content').innerHTML = `
      <div id="waiting">
        <img src="https://usastreetlifting.org/wp-content/uploads/2024/08/cropped-USA-Streetlifting-Transparent-File-PNG-1.png" alt="USASL">
        <p>${comp.name} – Competition hasn't started yet.</p>
      </div>`;
    return;
  }
  if (comp.status === 'finished') {
    renderFinished(comp, athletes, attempts);
    return;
  }

  // Get athletes in current flight sorted by declared weight
  const flightAthletes = athletes
    .filter(a => a.flight === comp.cur_flight)
    .map(a => {
      const att = attempts.find(x => x.athlete_id === a.id && x.lift === comp.cur_lift && x.attempt_num === comp.cur_attempt);
      return { ...a, declared_weight: att?.declared_weight ?? null, result: att?.result ?? null };
    })
    .sort((a, b) => (a.declared_weight ?? 9999) - (b.declared_weight ?? 9999));

  // Current athlete = first without result
  const current = flightAthletes.find(a => a.result === null || a.result === undefined);

  // Build scoreboard dots for each athlete across all lifts
  document.getElementById('main-content').innerHTML = buildLayout(comp, flightAthletes, current, attempts);

  // Flash result if just judged
  if (current === undefined) {
    // Round done
    document.getElementById('result-flash').textContent = 'Round Complete';
    document.getElementById('result-flash').className = '';
    document.getElementById('result-flash').style.color = '#f0c040';
  }

  attachFlashListener(comp, attempts);
}

function buildLayout(comp, flightAthletes, current, attempts) {
  const curName     = current ? current.name : '—';
  const curWeight   = current?.declared_weight ?? '—';
  const liftLabel   = LIFT_NAMES[comp.cur_lift] || comp.cur_lift;
  const photo       = current?.photo_url || '';

  const highlightHtml = current?.records
    ? `<strong>🏆 Records</strong>${escHtml(current.records)}`
    : current?.bio ? `<strong>About</strong>${escHtml(current.bio)}` : '';

  const sbRows = flightAthletes.map((a, i) => {
    const isCurrent = current && a.id === current.id;
    const dots = LIFTS.map(lift => {
      const att3 = [1,2,3].map(n => attempts.find(x => x.athlete_id === a.id && x.lift === lift && x.attempt_num === n));
      return att3.map(x => `<div class="dot ${x?.result === 1 ? 'good' : x?.result === 0 ? 'nolift' : ''}"></div>`).join('');
    }).join('<div style="width:4px"></div>');

    return `<div class="sb-row${isCurrent ? ' current' : ''}">
      <span class="pos">${i + 1}</span>
      <span class="sb-name">${escHtml(a.name)}</span>
      <span class="sb-wc">${escHtml(a.weight_class)}</span>
      <div class="sb-dots">${dots}</div>
    </div>`;
  }).join('');

  const liftTabs = LIFTS.map(l =>
    `<div class="lift-tab${l === comp.cur_lift ? ' active' : ''}">${LIFT_NAMES[l]}</div>`
  ).join('');

  return `
    <div id="athlete-panel">
      ${photo ? `<img id="athlete-photo" src="${escHtml(photo)}" alt="${escHtml(curName)}">` : `<div id="athlete-photo" style="display:flex;align-items:center;justify-content:center;font-size:3rem;">🏋️</div>`}
      <div id="athlete-name">${escHtml(curName)}</div>
      <div id="athlete-meta">
        <span>${current ? escHtml(current.weight_class) : ''} · Flight ${escHtml(comp.cur_flight)}</span>
      </div>
      ${highlightHtml ? `<div id="athlete-highlights">${highlightHtml}</div>` : ''}
    </div>
    <div id="score-panel">
      <div id="current-attempt">
        <span id="lift-label">${liftLabel}</span>
        <span id="attempt-label">Attempt ${comp.cur_attempt}</span>
        <div id="current-weight">${curWeight !== '—' ? curWeight : '—'}<span>${curWeight !== '—' ? ' kg' : ''}</span></div>
        <div id="result-flash"></div>
      </div>
      <div id="scoreboard">
        <h3>Flight ${escHtml(comp.cur_flight)} – Athletes</h3>
        ${sbRows}
      </div>
      <div id="lift-tabs">${liftTabs}</div>
    </div>`;
}

function renderFinished(comp, athletes, attempts) {
  // Compute totals
  const scored = athletes.map(a => {
    let total = 0;
    for (const lift of LIFTS) {
      const best = [1,2,3].reduce((max, n) => {
        const att = attempts.find(x => x.athlete_id === a.id && x.lift === lift && x.attempt_num === n && x.result === 1);
        return att ? Math.max(max, att.declared_weight || 0) : max;
      }, 0);
      total += best;
    }
    return { ...a, total };
  }).sort((a, b) => b.total - a.total);

  const rows = scored.map((a, i) => `
    <div class="sb-row" style="font-size:.9rem;padding:.6rem .75rem;">
      <span class="pos" style="font-size:.9rem;font-weight:700;color:${i===0?'#f0c040':i===1?'#ccc':i===2?'#cd7f32':'#666'}">${i+1}</span>
      <span class="sb-name">${escHtml(a.name)}</span>
      <span class="sb-wc">${escHtml(a.weight_class)}</span>
      <span style="font-weight:700;color:#fff">${a.total} kg</span>
    </div>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.5rem;width:100%">
      <div style="font-size:1rem;letter-spacing:.15em;text-transform:uppercase;color:#f0c040">🏆 Final Results – ${escHtml(comp.name)}</div>
      <div style="width:100%;max-width:600px">${rows}</div>
    </div>`;
}

function attachFlashListener(comp, attempts) {
  // Flash green/red on latest result within the last 3 seconds
  const recent = attempts
    .filter(x => x.result !== null && x.judged_at)
    .sort((a, b) => b.judged_at > a.judged_at ? 1 : -1)[0];

  const flashEl = document.getElementById('result-flash');
  if (!flashEl || !recent) return;
  const ago = recent.judged_at ? (Date.now() - new Date(recent.judged_at + 'Z').getTime()) : 99999;
  if (ago < 4000) {
    flashEl.textContent = recent.result === 1 ? '✓ GOOD LIFT' : '✗ NO LIFT';
    flashEl.className = recent.result === 1 ? 'good' : 'nolift';
    flashEl.style.color = '';
    setTimeout(() => { if (flashEl) { flashEl.textContent = ''; flashEl.className = ''; } }, 3000);
  }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SSE connection ────────────────────────────────────────────────────────────
function connect() {
  if (!compId) return;
  const es = new EventSource(`/api/comp/${compId}/stream`);
  es.onmessage = e => {
    try { render(JSON.parse(e.data)); } catch {}
  };
  es.onerror = () => {
    document.getElementById('status-bar').textContent = 'Connection lost – reconnecting…';
    es.close();
    setTimeout(connect, 3000);
  };
  es.onopen = () => {
    document.getElementById('status-bar').textContent = 'Connected – live';
  };
}

connect();
</script>
</body>
</html>
